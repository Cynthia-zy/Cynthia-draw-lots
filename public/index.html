<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>抽签小程序</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
:root{
  --bg:#fff;--bg2:#f5f5f5;--bg3:#eff1f5;
  --text:#1a1a1a;--text2:#6b7280;--text3:#9ca3af;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --radius:8px;--radius-lg:12px;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#0C447C;
  --green-bg:#EAF3DE;--green-text:#27500A;
  --amber-bg:#FAEEDA;--amber-text:#633806;
  --purple-bg:#EEEDFE;--purple-text:#3C3489;
  --red:#dc2626;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1e1e1e;--bg2:#141414;--bg3:#2a2a2a;--text:#f0f0f0;--text2:#a0a0a0;--text3:#555;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.22)}
}
.app{max-width:640px;margin:0 auto;padding:1.25rem 1rem}
h1{font-size:20px;font-weight:500;margin-bottom:1.25rem;color:var(--text)}
.nav-row{display:flex;gap:8px;margin-bottom:1.25rem}
.nav-btn{flex:1;padding:9px;font-size:14px;cursor:pointer;border-radius:var(--radius);background:transparent;color:var(--text2);border:0.5px solid var(--border);transition:all .15s}
.nav-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px}
.field input{width:100%;padding:9px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:15px;outline:none;transition:border .15s}
.field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.15)}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;padding:10px 12px;background:var(--bg3);border-radius:var(--radius)}
.badge{padding:3px 9px;border-radius:var(--radius);font-size:12px;font-weight:500}
.chip-late{background:var(--blue-bg);color:var(--blue-text)}
.chip-early{background:var(--green-bg);color:var(--green-text)}
.chip-dual{background:var(--amber-bg);color:var(--amber-text)}
.chip-grp{background:var(--purple-bg);color:var(--purple-text)}
.btn-primary{width:100%;padding:12px;font-size:15px;font-weight:500;cursor:pointer;border-radius:var(--radius);background:var(--blue);color:#fff;border:none;margin-top:12px;transition:opacity .15s,transform .1s}
.btn-primary:hover{opacity:.9}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.btn-sec{width:100%;padding:10px;font-size:14px;cursor:pointer;border-radius:var(--radius);background:transparent;color:var(--text2);border:0.5px solid var(--border2);margin-top:10px;transition:background .15s}
.btn-sec:hover{background:var(--bg3)}
.drum{height:76px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg3);display:flex;align-items:center;justify-content:center;margin:1rem 0;overflow:hidden}
.drum-text{font-size:18px;font-weight:500;color:var(--text);text-align:center;padding:0 12px}
.result-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:1rem 0}
.res-cell{text-align:center;padding:12px 6px;border-radius:var(--radius);border:0.5px solid var(--border)}
.res-cell .lbl{font-size:11px;color:var(--text2);margin-bottom:5px}
.res-cell .val{font-size:15px;font-weight:500}
.full-result{padding:10px 14px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--bg3);margin-top:8px}
.full-result .sub{font-size:12px;color:var(--text2);margin-bottom:4px}
.full-result .main{font-size:13px;color:var(--text);line-height:1.6}
.avt{width:40px;height:40px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-weight:500;font-size:16px;color:var(--blue-text);flex-shrink:0}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.stat-card{background:var(--bg3);border-radius:var(--radius);padding:10px 12px}
.stat-card .s-lbl{font-size:12px;color:var(--text2);margin-bottom:4px}
.stat-card .s-val{font-size:24px;font-weight:500;color:var(--text)}
.filter-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.filter-row input{flex:1;min-width:130px;padding:8px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:14px;outline:none}
.filter-row input:focus{border-color:var(--blue)}
.btn-danger{padding:8px 12px;font-size:13px;cursor:pointer;border-radius:var(--radius);background:transparent;color:var(--red);border:0.5px solid rgba(220,38,38,.4);white-space:nowrap}
.btn-export{padding:8px 12px;font-size:13px;cursor:pointer;border-radius:var(--radius);background:var(--blue);color:#fff;border:none;white-space:nowrap}
.tbl-wrap{overflow-x:auto;margin-top:1rem}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg3);color:var(--text2);font-weight:500;padding:8px 10px;text-align:left;border-bottom:0.5px solid var(--border)}
td{padding:7px 10px;border-bottom:0.5px solid var(--border);color:var(--text);word-break:break-all}
tr:last-child td{border-bottom:none}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:2px 5px;border-radius:4px}
.del-btn:hover{color:var(--red)}
.empty-state{text-align:center;padding:2.5rem;color:var(--text3);font-size:14px}
.empty-state i{font-size:28px;display:block;margin-bottom:10px}
.page{display:none}
.page.active{display:block}
.toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:var(--radius);font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.live-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes flash{0%,100%{opacity:1}50%{opacity:.15}}
.flash{animation:flash .5s}
.qr-section{text-align:center;padding:1.5rem;background:var(--bg3);border-radius:var(--radius-lg);margin-bottom:1rem}
.qr-section img{max-width:180px;border-radius:var(--radius);border:4px solid var(--bg)}
.url-box{display:flex;gap:8px;align-items:center;margin-top:12px;padding:8px 12px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius)}
.url-box span{flex:1;font-size:13px;color:var(--blue-text);word-break:break-all}
.copy-btn{padding:5px 10px;font-size:12px;cursor:pointer;border-radius:var(--radius);background:var(--blue);color:#fff;border:none;white-space:nowrap;flex-shrink:0}
</style>
</head>
<body>
<div class="app">
  <h1><i class="ti ti-confetti" style="vertical-align:-2px;margin-right:6px"></i>抽签小程序</h1>

  <div class="nav-row">
    <button class="nav-btn active" onclick="switchPage('draw')" id="nav-draw"><i class="ti ti-player-play"></i> 抽签</button>
    <button class="nav-btn" onclick="switchPage('admin')" id="nav-admin"><i class="ti ti-table"></i> 后台管理</button>
    <button class="nav-btn" onclick="switchPage('share')" id="nav-share"><i class="ti ti-qrcode"></i> 分享</button>
  </div>

  <!-- 抽签页 -->
  <div class="page active" id="page-draw">
    <div class="card" id="draw-input">
      <p style="font-size:13px;color:var(--text2);margin-bottom:1rem"><span class="live-dot"></span>实时同步 · 共 11 组，每组 12 人</p>
      <div class="field"><label>姓名</label><input type="text" id="nameInput" placeholder="请输入姓名"/></div>
      <div class="field" style="margin-bottom:0"><label>办事处</label><input type="text" id="officeInput" placeholder="请输入办事处"/></div>
      <div class="badges">
        <span class="badge chip-late">晚期一线 30%</span>
        <span class="badge chip-early">早期 30%</span>
        <span class="badge chip-dual">双艾 40%</span>
      </div>
      <button class="btn-primary" id="btnDraw" onclick="doDraw()"><i class="ti ti-player-play"></i> 开始抽签</button>
    </div>

    <div class="card" id="draw-spinning" style="display:none">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <div class="avt" id="avt"></div>
        <div>
          <p style="font-size:15px;font-weight:500;color:var(--text);margin:0" id="disp-name"></p>
          <p style="font-size:13px;color:var(--text2);margin:0" id="disp-office"></p>
        </div>
      </div>
      <div class="drum" id="drum"><span class="drum-text" id="drum-text">— — —</span></div>
      <div class="result-grid" id="res-grid" style="display:none">
        <div class="res-cell"><div class="lbl">分组</div><div class="val" id="r-grp" style="color:var(--purple-text)"></div></div>
        <div class="res-cell"><div class="lbl">顺序</div><div class="val" id="r-ord" style="color:var(--blue-text)"></div></div>
        <div class="res-cell"><div class="lbl">考题</div><div class="val" id="r-topic" style="font-size:12px"></div></div>
      </div>
      <div class="full-result" id="full-result" style="display:none">
        <div class="sub">抽签完成</div>
        <div class="main" id="full-text"></div>
      </div>
      <button class="btn-sec" onclick="resetDraw()"><i class="ti ti-refresh"></i> 继续抽签</button>
    </div>
  </div>

  <!-- 后台管理页 -->
  <div class="page" id="page-admin">
    <div class="stat-row">
      <div class="stat-card"><div class="s-lbl">已抽签</div><div class="s-val" id="stat-total">0</div></div>
      <div class="stat-card"><div class="s-lbl">剩余名额</div><div class="s-val" id="stat-left">132</div></div>
      <div class="stat-card"><div class="s-lbl">满员组数</div><div class="s-val" id="stat-full">0</div></div>
    </div>
    <div class="card">
      <div class="filter-row">
        <input type="text" id="filterInput" placeholder="搜索姓名 / 办事处 / 考题..." oninput="renderTable()"/>
        <button class="btn-danger" onclick="clearAll()"><i class="ti ti-trash"></i> 清空</button>
        <button class="btn-export" onclick="exportExcel()"><i class="ti ti-download"></i> 导出</button>
      </div>
    </div>
    <div class="empty-state" id="empty-hint"><i class="ti ti-inbox"></i>暂无抽签记录</div>
    <div class="tbl-wrap" id="tbl-container" style="display:none">
      <table>
        <thead><tr>
          <th style="width:36px">#</th>
          <th style="width:72px">姓名</th>
          <th>办事处</th>
          <th style="width:64px">分组</th>
          <th style="width:46px">顺序</th>
          <th>考题</th>
          <th style="width:68px">时间</th>
          <th style="width:32px"></th>
        </tr></thead>
        <tbody id="tbl-body"></tbody>
      </table>
    </div>
  </div>

  <!-- 分享页 -->
  <div class="page" id="page-share">
    <div class="qr-section">
      <p style="font-size:13px;color:var(--text2);margin-bottom:12px">扫描下方二维码，多人同时参与抽签</p>
      <img id="qr-img" src="" alt="二维码"/>
      <div class="url-box">
        <span id="app-url"></span>
        <button class="copy-btn" onclick="copyUrl()"><i class="ti ti-copy"></i> 复制</button>
      </div>
    </div>
    <div class="card" style="font-size:13px;color:var(--text2);line-height:1.8">
      <p style="font-weight:500;color:var(--text);margin-bottom:8px"><i class="ti ti-info-circle" style="vertical-align:-2px;margin-right:4px"></i>使用说明</p>
      <p>· 所有人扫同一个二维码，数据实时同步</p>
      <p>· 每次抽签结果全局唯一，不会重复</p>
      <p>· 管理员可在「后台管理」查看所有记录并导出 Excel</p>
      <p>· 服务器重启后数据会清空，请及时导出</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
const socket = io();
let records = [];
let spinIv, spinTo;

function showToast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

socket.on('new_draw', ({ rec, stats }) => {
  if (!records.find(r => r.id === rec.id)) records.push(rec);
  updateStats(stats);
  if (document.getElementById('page-admin').classList.contains('active')) renderTable();
  if (rec.name !== document.getElementById('disp-name').textContent)
    showToast(`${rec.name} 抽到第${rec.group}组 · 顺序${rec.order}`);
});

socket.on('record_deleted', ({ id, stats }) => {
  records = records.filter(r => r.id !== id);
  updateStats(stats);
  if (document.getElementById('page-admin').classList.contains('active')) renderTable();
});

socket.on('records_cleared', ({ stats }) => {
  records = [];
  updateStats(stats);
  if (document.getElementById('page-admin').classList.contains('active')) renderTable();
  showToast('记录已清空');
});

async function loadRecords() {
  const res = await fetch('/api/records');
  const data = await res.json();
  records = data.records;
  updateStats(data.stats);
  renderTable();
}
loadRecords();

function switchPage(p) {
  ['draw','admin','share'].forEach(n => {
    document.getElementById('page-'+n).classList.toggle('active', n===p);
    document.getElementById('nav-'+n).classList.toggle('active', n===p);
  });
  if (p === 'admin') renderTable();
  if (p === 'share') renderQR();
}

function renderQR() {
  const url = window.location.href.split('#')[0];
  document.getElementById('app-url').textContent = url;
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(url)}`;
  document.getElementById('qr-img').src = qrUrl;
}

function copyUrl() {
  const url = document.getElementById('app-url').textContent;
  navigator.clipboard.writeText(url).then(() => showToast('链接已复制'));
}

async function doDraw() {
  const name = document.getElementById('nameInput').value.trim();
  const office = document.getElementById('officeInput').value.trim();
  if (!name) { document.getElementById('nameInput').focus(); return; }
  if (!office) { document.getElementById('officeInput').focus(); return; }

  document.getElementById('btnDraw').disabled = true;
  let result;
  try {
    const res = await fetch('/api/draw', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name, office })
    });
    if (!res.ok) { const e = await res.json(); alert(e.error); document.getElementById('btnDraw').disabled=false; return; }
    result = await res.json();
  } catch(e) { alert('网络错误，请重试'); document.getElementById('btnDraw').disabled=false; return; }

  const rec = result.rec;
  document.getElementById('disp-name').textContent = name;
  document.getElementById('disp-office').textContent = office;
  document.getElementById('avt').textContent = name.slice(0,1);
  document.getElementById('draw-input').style.display = 'none';
  document.getElementById('draw-spinning').style.display = 'block';
  document.getElementById('res-grid').style.display = 'none';
  document.getElementById('full-result').style.display = 'none';

  const drumTxt = document.getElementById('drum-text');
  const previews=['第3组·顺序7·双艾case','第8组·顺序2·晚期一线','第1组·顺序11·早期case','第6组·顺序5·双艾case','第11组·顺序9·晚期一线'];
  let li=0;
  spinIv = setInterval(() => { drumTxt.textContent = previews[li++ % previews.length]; }, 110);

  spinTo = setTimeout(() => {
    clearInterval(spinIv);
    drumTxt.textContent = `第${rec.group}组 · 顺序${rec.order} · ${rec.topic}`;
    document.getElementById('r-grp').textContent = `第${rec.group}组`;
    document.getElementById('r-ord').textContent = `第${rec.order}位`;
    const tc = rec.topic==='艾瑞康晚期一线case'?'var(--blue-text)':rec.topic==='艾瑞康早期case'?'var(--green-text)':'var(--amber-text)';
    const rt = document.getElementById('r-topic');
    rt.textContent = rec.topic; rt.style.color = tc;
    document.getElementById('res-grid').style.display = 'grid';
    document.getElementById('full-result').style.display = 'block';
    document.getElementById('full-text').textContent = `${rec.name}（${rec.office}）抽得：第${rec.group}组 · 出场顺序第${rec.order}位 · 考题：${rec.topic}`;
    const d = document.getElementById('drum');
    d.classList.add('flash'); setTimeout(() => d.classList.remove('flash'), 500);
    document.getElementById('btnDraw').disabled = false;
  }, 2600);
}

function resetDraw() {
  clearInterval(spinIv); clearTimeout(spinTo);
  document.getElementById('draw-input').style.display = 'block';
  document.getElementById('draw-spinning').style.display = 'none';
  document.getElementById('nameInput').value = '';
  document.getElementById('officeInput').value = '';
  document.getElementById('nameInput').focus();
}

function topicBadge(t) {
  const cls = t==='艾瑞康晚期一线case'?'chip-late':t==='艾瑞康早期case'?'chip-early':'chip-dual';
  return `<span class="badge ${cls}">${t}</span>`;
}

function updateStats(stats) {
  document.getElementById('stat-total').textContent = stats.total;
  document.getElementById('stat-left').textContent = stats.left;
  document.getElementById('stat-full').textContent = stats.full;
}

function renderTable() {
  const q = (document.getElementById('filterInput').value||'').toLowerCase();
  const filtered = records.filter(r => r.name.toLowerCase().includes(q)||r.office.toLowerCase().includes(q)||r.topic.toLowerCase().includes(q));
  document.getElementById('empty-hint').style.display = records.length?'none':'block';
  document.getElementById('tbl-container').style.display = records.length?'block':'none';
  document.getElementById('tbl-body').innerHTML = filtered.map((r,i) => `
    <tr>
      <td style="color:var(--text3)">${i+1}</td>
      <td style="font-weight:500">${r.name}</td>
      <td>${r.office}</td>
      <td><span class="badge chip-grp">第${r.group}组</span></td>
      <td>${r.order}</td>
      <td>${topicBadge(r.topic)}</td>
      <td style="color:var(--text3);font-size:12px">${r.time}</td>
      <td><button class="del-btn" onclick="deleteRec(${r.id})"><i class="ti ti-x"></i></button></td>
    </tr>`).join('');
}

async function deleteRec(id) {
  await fetch(`/api/records/${id}`, { method: 'DELETE' });
}

async function clearAll() {
  if (!records.length) return;
  if (!confirm('确定清空所有抽签记录？')) return;
  await fetch('/api/records', { method: 'DELETE' });
}

function exportExcel() {
  if (!records.length) { alert('暂无记录可导出'); return; }
  const data = [['序号','姓名','办事处','分组','顺序','考题','抽签时间']];
  records.forEach((r,i) => data.push([i+1,r.name,r.office,`第${r.group}组`,r.order,r.topic,r.time]));
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols']=[{wch:6},{wch:10},{wch:14},{wch:8},{wch:6},{wch:18},{wch:12}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '抽签结果');
  XLSX.writeFile(wb, '抽签结果.xlsx');
}

document.getElementById('nameInput').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('officeInput').focus(); });
document.getElementById('officeInput').addEventListener('keydown', e => { if(e.key==='Enter') doDraw(); });
</script>
</body>
</html>
